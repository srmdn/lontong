<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.12) } }
      .mark { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      @media (prefers-reduced-motion: reduce) { .mark { animation: none } }
    </style>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0F0F12"/>
  <g class="mark">
    <rect x="7.5" y="5.5" width="5.5" height="21" rx="2.5" fill="#991B1B"/>
    <rect x="14.5" y="21" width="10.5" height="5.5" rx="2.5" fill="#991B1B"/>
  </g>
</svg>