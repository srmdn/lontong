<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Flash prevention: set dark class before ANY paint -->
    <script>
      (function() {
        try {
          var theme = JSON.parse(localStorage.getItem('lontong-theme'));
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>

    <title>Lontong (LPanel) — Kelola Server Tanpa Beban</title>
    <meta name="description" content="Control panel open-source yang dibangun dengan Go dan Caddy. Ringan untuk VPS kecil, tangguh untuk traffic besar." />
